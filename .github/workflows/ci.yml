name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lumis_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production-use-only-xxxxxxxx
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DB_NAME: lumis_ci
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Migrações aplicadas (sem drift)
        run: |
          python manage.py migrate --noinput
          python manage.py makemigrations --check --dry-run

      - name: Testes Django
        run: python manage.py test --verbosity 2

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: ESLint (spec Vitest — expandir quando o projeto estiver formatado)
        run: npx eslint src/stores/auth.spec.js --max-warnings 0

      - name: Vitest
        run: npm run test -- --run

      - name: Build
        run: npm run build
